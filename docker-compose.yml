version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: fulcrum-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fulcrum
      POSTGRES_USER: fulcrum
      POSTGRES_PASSWORD: fulcrum
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fulcrum"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: